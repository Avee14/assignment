apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spring-postgres-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Avee14/assignment.git
    targetRevision: master
    path: gitops/spring-app

  destination:
    server: https://kubernetes.default.svc
    namespace: spring-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true